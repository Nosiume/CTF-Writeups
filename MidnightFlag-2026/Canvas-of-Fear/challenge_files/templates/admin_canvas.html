<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybe its too late</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Eater&family=Butcherman&family=Griffy&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            transition: filter 0.3s ease, brightness 0.1s ease;
        }

        /* Lumière clignotante qui éclaire la page */
        #flickering-light {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 40%, transparent 70%);
            box-shadow: 0 0 200px 100px rgba(255, 255, 255, 0.1),
                        0 0 300px 150px rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 0;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            10% {
                opacity: 0.1;
                transform: translate(-50%, -50%) scale(0.95);
            }
            20% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1.05);
            }
            30% {
                opacity: 0.05;
                transform: translate(-50%, -50%) scale(0.9);
            }
            40% {
                opacity: 0.35;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.2;
                transform: translate(-50%, -50%) scale(0.98);
            }
            60% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(1.02);
            }
            70% {
                opacity: 0.1;
                transform: translate(-50%, -50%) scale(0.92);
            }
            80% {
                opacity: 0.3;
                transform: translate(-50%, -50%) scale(1);
            }
            90% {
                opacity: 0.15;
                transform: translate(-50%, -50%) scale(0.96);
            }
        }

        body.dark {
            filter: brightness(0.3);
        }
        
        h1 {
            color: #ff4444;
            text-align: center;
            font-family: 'Creepster', 'Nosifer', cursive;
            font-size: 32px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5),
                         0 0 20px rgba(139, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        h3, h4 {
            color: #ff6666;
            margin: 15px 0 10px 0;
            font-family: 'Creepster', 'Nosifer', cursive;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(255, 102, 102, 0.4),
                         0 0 15px rgba(139, 0, 0, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 30px;
            position: relative;
            z-index: 1;
            transition: opacity 0.1s ease;
        }
        
        .canvas-area {
            flex: 1;
        }
        
        .controls {
            width: 300px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .grid {
            display: inline-grid;
            gap: 1px;
            background: rgba(20, 20, 20, 0.8);
            padding: 5px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }
        
        .pixel {
            width: 20px;
            height: 20px;
            background: #000;
            cursor: pointer;
            border: 1px solid #222;
        }
        
        .pixel:hover {
            border: 1px solid #fff;
        }
        
        input, button, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: rgba(20, 20, 20, 0.6);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        
        button {
            cursor: pointer;
            background: linear-gradient(135deg, #333, #222);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        button:hover {
            background: linear-gradient(135deg, #444, #333);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }
        
        .canvas-list {
            margin: 20px 0;
            padding: 10px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        
        .canvas-item {
            padding: 5px;
            margin: 5px 0;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .canvas-item:hover {
            background: rgba(30, 30, 30, 0.8);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .canvas-item.active {
            background: rgba(40, 40, 40, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        #status {
            margin: 10px 0;
            padding: 10px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: none;
            color: #bbb;
        }
        
        #status.error {
            border-color: rgba(255, 100, 100, 0.5);
            color: #ff6666;
        }
        #mouse-light {
            position: fixed;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 30%, transparent 70%);
            box-shadow: 0 0 100px 50px rgba(255, 255, 255, 0.15),
                        0 0 150px 75px rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #mouse-light.active {
            opacity: 1;
        }


        .mouse-word {
            position: fixed;
            color: #ff4444;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 68, 68, 0.6),
                         0 0 15px rgba(255, 68, 68, 0.4),
                         0 0 25px rgba(139, 0, 0, 0.5),
                         0 0 35px rgba(139, 0, 0, 0.4);
            z-index: 9999;
            pointer-events: none;
            white-space: nowrap;
            animation: wordAppear 2.5s ease-out forwards;
            font-family: 'Butcherman', 'Creepster', 'Eater', cursive;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @keyframes wordAppear {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5) rotate(-5deg);
                filter: blur(5px);
            }
            10% {
                opacity: 0.8;
                transform: translate(-50%, -50%) scale(1.1) rotate(2deg);
                filter: blur(2px);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.95) rotate(-1deg);
                filter: blur(0px);
            }
            30% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05) rotate(1deg);
                filter: blur(0px);
            }
            40% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                filter: blur(0px);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.02) rotate(0deg);
                filter: blur(0px);
            }
            60% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.98) rotate(0deg);
                filter: blur(0px);
            }
            70% {
                opacity: 0.9;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                filter: blur(0px);
            }
            80% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(0.95) rotate(0deg);
                filter: blur(1px);
            }
            90% {
                opacity: 0.4;
                transform: translate(-50%, -50%) scale(0.9) rotate(0deg);
                filter: blur(2px);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8) rotate(0deg);
                filter: blur(5px);
            }
        }
    </style>
</head>
<body>
    <div id="flickering-light"></div>
    <div id="mouse-light"></div>
    <h1>Blood Canvas Admin Panel</h1>
    
    <div class="container">
        <div class="canvas-area">
            <h3>Canvas View</h3>
            <div id="canvasGrid" class="grid"></div>
        </div>
        
        <div class="controls">
            <h3>Canvas Control</h3>
            
            <div>
                <h4>Create Canvas</h4>
                <input type="number" id="canvasId" placeholder="Canvas ID" value="1">
                <input type="number" id="width" placeholder="Width" value="10" max="50">
                <input type="number" id="height" placeholder="Height" value="10" max="50">
                <button onclick="createCanvas()">Create</button>
            </div>
            
            <div>
                <h4>Active Canvas</h4>
                <div id="canvasList" class="canvas-list"></div>
            </div>
            
            <div>
                <h4>Paint Pixel</h4>
                <input type="color" id="colorPicker" value="#8B0000">
                <input type="number" id="paintX" placeholder="X (can be negative!)" value="0">
                <input type="number" id="paintY" placeholder="Y (can be negative!)" value="0">
                <button onclick="paintPixel()">Paint</button>
            </div>
            
            <div>
                <button onclick="refreshCanvas()">Refresh</button>
                <button onclick="deleteCanvas()">Delete Canvas</button>
            </div>
            
            <div id="status"></div>
        </div>
    </div>
    
    <script>
        let currentCanvas = null;
        let currentWidth = 0;
        let currentHeight = 0;
        
        async function createCanvas() {
            const id = document.getElementById('canvasId').value;
            const width = document.getElementById('width').value;
            const height = document.getElementById('height').value;
            
            try {
                const response = await fetch('/api/canvas/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, width, height})
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    showStatus('Canvas created!', false);
                    loadCanvasList();
                    selectCanvas(id, width, height);
                } else {
                    showStatus(data.message, true);
                }
            } catch (error) {
                showStatus('Error: ' + error, true);
            }
        }
        
        async function loadCanvasList() {
            try {
                const response = await fetch('/api/canvas/list');
                const data = await response.json();
                
                const list = document.getElementById('canvasList');
                list.innerHTML = '';
                
                data.canvases.forEach(canvas => {
                    const div = document.createElement('div');
                    div.className = 'canvas-item';
                    div.textContent = `Canvas ${canvas.id} - ${canvas.dimensions} @ ${canvas.address}`;
                    div.onclick = () => {
                        const dims = canvas.dimensions.split('x');
                        selectCanvas(canvas.id, dims[0], dims[1]);
                    };
                    list.appendChild(div);
                });
            } catch (error) {
                console.error('Error loading canvas list:', error);
            }
        }
        
        function selectCanvas(id, width, height) {
            currentCanvas = id;
            currentWidth = parseInt(width);
            currentHeight = parseInt(height);
            
            // Update UI
            document.querySelectorAll('.canvas-item').forEach(item => {
                item.classList.remove('active');
                if (item.textContent.includes(`Canvas ${id}`)) {
                    item.classList.add('active');
                }
            });
            
            initGrid(currentWidth, currentHeight);
            refreshCanvas();
        }
        
        function initGrid(width, height) {
            const grid = document.getElementById('canvasGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${width}, 20px)`;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const pixel = document.createElement('div');
                    pixel.className = 'pixel';
                    pixel.dataset.x = x;
                    pixel.dataset.y = y;
                    pixel.onclick = () => {
                        document.getElementById('paintX').value = x;
                        document.getElementById('paintY').value = y;
                        paintPixel();
                    };
                    grid.appendChild(pixel);
                }
            }
        }
        
        async function paintPixel() {
            if (!currentCanvas) {
                showStatus('Select a canvas first', true);
                return;
            }
            
            const x = document.getElementById('paintX').value;
            const y = document.getElementById('paintY').value;
            const color = document.getElementById('colorPicker').value;
            
            try {
                const response = await fetch('/api/canvas/set', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: currentCanvas,
                        x: parseInt(x),
                        y: parseInt(y),
                        color: color.replace('#', '0x')
                    })
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    if (x >= 0 && x < currentWidth && y >= 0 && y < currentHeight) {
                        const pixel = document.querySelector(`[data-x="${x}"][data-y="${y}"]`);
                        if (pixel) pixel.style.background = color;
                    }
                    showStatus(`Painted (${x}, ${y})`, false);
                } else {
                    showStatus('Paint failed', true);
                }
            } catch (error) {
                showStatus('Error: ' + error, true);
            }
        }
        
        async function refreshCanvas() {
            if (!currentCanvas) return;
            
            try {
                const response = await fetch(`/api/canvas/get/${currentCanvas}`);
                const data = await response.json();
                
                if (data.status === 'success' && data.pixels) {
                    const pixels = document.querySelectorAll('.pixel');
                    data.pixels.forEach((color, idx) => {
                        if (pixels[idx]) {
                            const hex = color.replace('0x', '#');
                            pixels[idx].style.background = hex;
                        }
                    });
                }
            } catch (error) {
                console.error('Error refreshing:', error);
            }
        }
        
        async function deleteCanvas() {
            if (!currentCanvas) return;
            
            try {
                const response = await fetch(`/api/canvas/delete/${currentCanvas}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showStatus('Canvas deleted', false);
                    currentCanvas = null;
                    document.getElementById('canvasGrid').innerHTML = '';
                    loadCanvasList();
                }
            } catch (error) {
                showStatus('Delete failed', true);
            }
        }
        
        function showStatus(message, isError) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isError ? 'error' : '';
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
        
        loadCanvasList();

        const mouseWords = [
            "RUN",
            "HIDE",
            "FEAR",
            "DEATH",
            "WATCH",
            "SEE",
            "FOUND",
            "NEAR",
            "CLOSE",
            "BEHIND",
            "ALONE",
            "TRAP",
            "DANGER",
            "WAIT",
            "STOP",
            "HELP",
            "GONE",
            "LOST",
            "DEAD",
            "END"
        ];

        const mouseLight = document.getElementById('mouse-light');

        document.addEventListener('mousemove', function(e) {
            mouseLight.style.left = e.pageX + 'px';
            mouseLight.style.top = e.pageY + 'px';
            mouseLight.classList.add('active');

            if (Math.random() < 0.03) {
                showMouseWord(e.pageX, e.pageY);
            }
        });

        document.addEventListener('mouseleave', function() {
            mouseLight.classList.remove('active');
        });

        function showMouseWord(x, y) {
            const wordDiv = document.createElement('div');
            wordDiv.className = 'mouse-word';
            wordDiv.style.left = x + 'px';
            wordDiv.style.top = y + 'px';
            
            const randomWord = mouseWords[Math.floor(Math.random() * mouseWords.length)];
            
            const fonts = ['Butcherman', 'Creepster', 'Eater', 'Nosifer'];
            const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
            wordDiv.style.fontFamily = `'${randomFont}', cursive`;
            
            let currentIndex = 0;
            const letters = randomWord.split('');
            wordDiv.textContent = '';
            
            const typeInterval = setInterval(() => {
                if (currentIndex < letters.length) {
                    wordDiv.textContent += letters[currentIndex];
                    currentIndex++;
                    
                    const offsetX = (Math.random() - 0.5) * 4;
                    const offsetY = (Math.random() - 0.5) * 4;
                    const rotation = (Math.random() - 0.5) * 10;
                    wordDiv.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px)) rotate(${rotation}deg)`;
                    
                    wordDiv.style.textShadow = `0 0 8px rgba(255, 68, 68, 0.6),
                                                 0 0 15px rgba(255, 68, 68, 0.4),
                                                 0 0 25px rgba(139, 0, 0, 0.5),
                                                 0 0 35px rgba(139, 0, 0, 0.4)`;
                } else {
                    clearInterval(typeInterval);
                }
            }, 60 + Math.random() * 60);
            
            document.body.appendChild(wordDiv);
            
            setTimeout(() => {
                if (wordDiv.parentNode) {
                    wordDiv.parentNode.removeChild(wordDiv);
                }
            }, 2500);
        }

        const flickeringLight = document.getElementById('flickering-light');
        
        function updateBrightness() {
            const light = flickeringLight;
            const computedStyle = window.getComputedStyle(light);
            const opacity = parseFloat(computedStyle.opacity);

            if (opacity < 0.15) {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        }
        setInterval(updateBrightness, 50);
    </script>
</body>
</html>
